{# Shell-wide JS: theme toggle, sidebar drawer, CSRF, scrape SSE stream, shared
   helpers. Included inline (not a static asset) so every page response carries
   these hooks and the Tailwind @source scan sees the class strings below. #}
<script>
    const THEME_STORAGE_KEY = "cv-arxiv-theme";

    function applyTheme(theme) {
        const root = document.documentElement;
        const normalizedTheme = theme === "dark" ? "dark" : "light";
        if (normalizedTheme === "dark") {
            root.dataset.theme = "dark";
        } else {
            delete root.dataset.theme;
        }

        const button = document.getElementById("theme-toggle");
        const label = document.getElementById("theme-toggle-label");
        const icon = document.getElementById("theme-toggle-icon");
        if (!button || !label || !icon) {
            return;
        }
        const nextTheme = normalizedTheme === "dark" ? "light" : "dark";
        button.setAttribute("aria-label", `Switch to ${nextTheme} mode`);
        button.setAttribute("title", `Switch to ${nextTheme} mode`);
        label.textContent = normalizedTheme === "dark" ? "Dark" : "Light";
        icon.textContent = normalizedTheme === "dark" ? "☀" : "◐";
    }

    function getPreferredTheme() {
        try {
            const storedTheme = localStorage.getItem(THEME_STORAGE_KEY);
            if (storedTheme === "dark" || storedTheme === "light") {
                return storedTheme;
            }
        } catch (_error) {
            // Ignore storage failures and fall back to the system preference.
        }
        return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    }

    function toggleTheme() {
        const currentTheme = document.documentElement.dataset.theme === "dark" ? "dark" : "light";
        const nextTheme = currentTheme === "dark" ? "light" : "dark";
        try {
            localStorage.setItem(THEME_STORAGE_KEY, nextTheme);
        } catch (_error) {
            // Ignore storage failures; the current page state will still update.
        }
        applyTheme(nextTheme);
    }

    function toggleShortcutHelp() {
        document.getElementById("shortcut-overlay").classList.toggle("hidden");
    }

    function toggleSidebar() {
        const sidebar = document.getElementById("app-sidebar");
        const backdrop = document.getElementById("sidebar-backdrop");
        if (!sidebar) return;
        const opening = sidebar.classList.contains("-translate-x-full");
        sidebar.classList.toggle("-translate-x-full", !opening);
        if (backdrop) backdrop.classList.toggle("hidden", !opening);
    }

    function getCsrfToken() {
        const meta = document.querySelector('meta[name="csrf-token"]');
        return meta ? meta.content : "";
    }

    const BADGE_COLORS = {
        Author: "bg-accent-soft text-accent",
        Affiliation: "bg-accent-soft text-accent",
        Title: "bg-accent-soft text-accent",
    };

    function renderBadges(matchTypes) {
        const fragment = document.createDocumentFragment();
        matchTypes.forEach((type) => {
            const color = BADGE_COLORS[type] || "bg-surface-2 text-fg-muted";
            const badge = document.createElement("span");
            badge.className = `shrink-0 inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-semibold ${color}`;
            badge.textContent = type;
            fragment.appendChild(badge);
        });
        return fragment;
    }

    function handleImgError(img) {
        if (!img || !img.parentElement) {
            return;
        }
        img.parentElement.innerHTML =
            '<div class="w-full h-full flex items-center justify-center bg-surface-2 text-fg-subtle">' +
            '<svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">' +
            '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>' +
            '</svg></div>';
    }

    function setOverlayVisible(visible) {
        const overlay = document.getElementById("progress-overlay");
        overlay.classList.toggle("hidden", !visible);
    }

    // Staged progress model. Each scrape phase owns a band of the bar; determinate
    // stages (downloading, processing) interpolate within their band from per-item
    // counts, while network-bound stages pulse at the band's start so the UI keeps
    // telling the user what's happening instead of freezing at 0%.
    const SCRAPE_STAGES = {
        feed:           { title: "Reading feed",          subtitle: "Connecting to arXiv...",                   start: 3 },
        rolling_window: { title: "Loading recent papers", subtitle: "Pulling the rolling window from arXiv...", start: 5 },
        filtered:       { title: "Checking your library", subtitle: "",                                         start: 8 },
        affiliations:   { title: "Fetching metadata",     subtitle: "Querying arXiv for authors and venues...", start: 12 },
        downloading:    { title: "Downloading PDFs",      subtitle: "Checking affiliations on each paper...",   start: 15, end: 55 },
        processing:     { title: "Ranking papers",        subtitle: "Scoring against your interests...",        start: 55, end: 90 },
        saving:         { title: "Saving results",        subtitle: "Writing matches to your library...",       start: 90, solid: true },
        thumbnails:     { title: "Rendering previews",    subtitle: "Generating PDF thumbnails...",             start: 93, solid: true },
        embeddings:     { title: "Building search index", subtitle: "Computing semantic embeddings...",         start: 96, solid: true },
        sections:       { title: "Extracting sections",   subtitle: "Parsing PDF structure...",                 start: 98, solid: true },
    };

    // Highest bar value applied so far this run. Events can legitimately arrive in an
    // order that would otherwise nudge the bar backwards (e.g. the "feed" event lands
    // after "rolling_window" already advanced it), so progress is clamped monotonic.
    // Reset to 0 at the start of every scrape (see startScrape).
    let lastBarPct = 0;

    function setProgressBar(pct, { solid = false } = {}) {
        const clamped = Math.max(0, Math.min(100, pct));
        // Never move backwards mid-run; terminal states set width/aria directly.
        const next = Math.max(clamped, lastBarPct);
        lastBarPct = next;
        const rounded = Math.round(next);
        const bar = document.getElementById("progress-bar");
        bar.style.width = `${next}%`;
        bar.classList.toggle("bar-pulse", !solid);
        bar.setAttribute("aria-valuenow", String(rounded));
        document.getElementById("progress-pct").textContent = `${rounded}%`;
    }

    // Only writes when the text actually changes, so re-setting the same phase copy on
    // every streamed item (one event per PDF / per ranked paper) doesn't churn the
    // aria-live region and spam screen readers.
    function setProgressText(title, subtitle) {
        const titleEl = document.getElementById("progress-title");
        const subtitleEl = document.getElementById("progress-subtitle");
        if (title != null && titleEl.textContent !== title) titleEl.textContent = title;
        if (subtitle != null && subtitleEl.textContent !== subtitle) subtitleEl.textContent = subtitle;
    }

    // Position within a stage's band from a done/total ratio (clamped 0..1).
    function bandPct(stage, done, total) {
        if (!total || total <= 0) return stage.start;
        const span = (stage.end != null ? stage.end : stage.start) - stage.start;
        return stage.start + Math.min(1, Math.max(0, done / total)) * span;
    }

    async function startScrape(force = false) {
        const btn = document.getElementById("scrape-btn");
        btn.disabled = true;
        document.getElementById("scrape-icon").classList.add("animate-spin");
        document.getElementById("scrape-text").textContent = "Scraping...";

        lastBarPct = 0;
        const progressBar = document.getElementById("progress-bar");
        progressBar.style.width = "2%";
        progressBar.className = "h-full bg-accent rounded-full transition-all duration-300 ease-out bar-pulse";
        progressBar.setAttribute("aria-valuenow", "0");
        document.getElementById("progress-pct").textContent = "0%";
        document.getElementById("progress-matches").textContent = "0 matches";
        document.getElementById("progress-counter").textContent = "";
        document.getElementById("progress-title").textContent = SCRAPE_STAGES.feed.title;
        document.getElementById("progress-subtitle").textContent = SCRAPE_STAGES.feed.subtitle;
        document.getElementById("progress-feed").innerHTML =
            '<p class="text-xs text-fg-subtle text-center py-4" id="feed-placeholder">Waiting for matches...</p>';
        document.getElementById("progress-stats").classList.add("hidden");
        document.getElementById("progress-footer").classList.add("hidden");
        document.getElementById("progress-footer").innerHTML =
            '<button onclick="closeScrapeAndReload()" class="btn-primary text-sm">View Results</button>';
        document.getElementById("progress-footer").className = "hidden border-t border-edge px-4 py-2 bg-surface-2 text-right";

        setOverlayVisible(true);

        const csrfToken = getCsrfToken();
        const headers = {
            "Content-Type": "application/json",
        };
        if (csrfToken) {
            headers["X-CSRF-Token"] = csrfToken;
        }

        try {
            const startResponse = await fetch("/api/scrape", {
                method: "POST",
                headers,
                body: JSON.stringify({ force }),
            });
            const startData = await startResponse.json().catch(() => ({}));
            if (!startResponse.ok || !startData.job_id) {
                throw new Error(startData.error || "Unable to start scrape");
            }

            const streamParams = new URLSearchParams({ job_id: startData.job_id });
            const source = new EventSource(`/api/scrape/stream?${streamParams.toString()}`);

            source.addEventListener("feed", (event) => {
                const data = JSON.parse(event.data);
                // The bar is already at the feed band from the status{phase:"feed"} (or
                // "rolling_window") event; this listener only refines the copy + counter.
                setProgressText(SCRAPE_STAGES.feed.title, `Found ${data.total} paper${data.total === 1 ? "" : "s"} in feed`);
                document.getElementById("progress-counter").textContent = `${data.total} in feed`;
            });

            source.addEventListener("progress", (event) => {
                updateProgress(JSON.parse(event.data));
            });

            source.addEventListener("match", (event) => {
                const data = JSON.parse(event.data);
                updateProgress(data);
                addMatchToFeed(data.paper);
            });

            source.addEventListener("status", (event) => {
                handleScrapeStatus(JSON.parse(event.data));
            });

            source.addEventListener("scrape_error", (event) => {
                const data = JSON.parse(event.data);
                document.getElementById("progress-title").textContent = "Scrape error";
                document.getElementById("progress-subtitle").textContent = data.message || "Unexpected failure";
                const bar = document.getElementById("progress-bar");
                bar.style.width = "100%";
                bar.className = "h-full bg-red-500 rounded-full transition-all duration-300 ease-out";
                bar.setAttribute("aria-valuenow", "100");
                document.getElementById("progress-footer").classList.remove("hidden");
                source.close();
                resetScrapeButton();
            });

            source.addEventListener("done", (event) => {
                const data = JSON.parse(event.data);
                source.close();
                showDone(data);
            });

            source.addEventListener("skipped", (event) => {
                const data = JSON.parse(event.data);
                source.close();

                document.getElementById("progress-title").textContent = "Already scraped";
                document.getElementById("progress-subtitle").textContent = data.reason || "Today's papers have already been fetched.";
                const skippedBar = document.getElementById("progress-bar");
                skippedBar.style.width = "100%";
                skippedBar.className = "h-full bg-amber-400 rounded-full transition-all duration-300 ease-out";
                skippedBar.setAttribute("aria-valuenow", "100");
                document.getElementById("progress-pct").textContent = "";
                document.getElementById("progress-matches").textContent = "";
                document.getElementById("progress-counter").textContent = "";

                const footer = document.getElementById("progress-footer");
                footer.className = "border-t border-edge px-4 py-2 bg-surface-2 flex items-center justify-end gap-2";
                footer.innerHTML =
                    '<button onclick="setOverlayVisible(false); resetScrapeButton();" class="px-3 py-1.5 text-xs font-medium text-fg-muted hover:text-fg transition-colors">Dismiss</button>' +
                    '<button onclick="startScrape(true)" class="btn-primary px-3 py-1.5 text-xs">Run Again</button>';

                resetScrapeButton();
            });

            source.onerror = () => {
                source.close();
                document.getElementById("progress-title").textContent = "Connection lost";
                document.getElementById("progress-subtitle").textContent = "Checking if scrape is still running...";
                pollScrapeStatus();
            };
        } catch (error) {
            document.getElementById("progress-title").textContent = "Unable to start scrape";
            document.getElementById("progress-subtitle").textContent = error.message || "Unexpected failure";
            const bar = document.getElementById("progress-bar");
            bar.style.width = "100%";
            bar.className = "h-full bg-red-500 rounded-full transition-all duration-300 ease-out";
            bar.setAttribute("aria-valuenow", "100");
            document.getElementById("progress-footer").classList.remove("hidden");
            resetScrapeButton();
        }
    }

    function resetScrapeButton() {
        document.getElementById("scrape-icon").classList.remove("animate-spin");
        document.getElementById("scrape-text").textContent = "Run Scrape";
        document.getElementById("scrape-btn").disabled = false;
    }

    // Map every streamed scrape phase onto the staged progress bar + a human-readable
    // line, so the long network stages (metadata, PDF downloads) and the post-match
    // stages (thumbnails, embeddings, sections) all report progress instead of leaving
    // the toast frozen on "Processing papers / 0%".
    function handleScrapeStatus(data) {
        const phase = data.phase;

        if (phase === "heartbeat") {
            // Keep the current stage text; just reassure that work is ongoing.
            setProgressText(null, "Still working — a fresh run can take a few minutes.");
            return;
        }

        if (phase === "filtered") {
            const fresh = data.new || 0;
            const seen = data.already_seen || 0;
            const subtitle = seen > 0
                ? `${fresh} new · ${seen} already in your library`
                : `${fresh} new paper${fresh === 1 ? "" : "s"} to process`;
            setProgressText(SCRAPE_STAGES.filtered.title, subtitle);
            document.getElementById("progress-counter").textContent = `${fresh} new`;
            setProgressBar(SCRAPE_STAGES.filtered.start);
            return;
        }

        if (phase === "downloading") {
            const stage = SCRAPE_STAGES.downloading;
            setProgressText(stage.title, stage.subtitle);
            document.getElementById("progress-counter").textContent = `${data.done} / ${data.total} PDFs`;
            setProgressBar(bandPct(stage, data.done, data.total));
            return;
        }

        const stage = SCRAPE_STAGES[phase];
        if (!stage) {
            return;
        }
        setProgressText(stage.title, data.message || stage.subtitle);
        setProgressBar(stage.start, { solid: !!stage.solid });
    }

    function updateProgress(data) {
        if (!data.total) {
            return;
        }
        const stage = SCRAPE_STAGES.processing;
        const processed = data.processed || 0;
        setProgressBar(bandPct(stage, processed, data.total));
        document.getElementById("progress-counter").textContent = `${processed} / ${data.total}`;
        document.getElementById("progress-matches").textContent = `${data.matched} match${data.matched !== 1 ? "es" : ""}`;
    }

    function addMatchToFeed(paper) {
        const feed = document.getElementById("progress-feed");
        const placeholder = document.getElementById("feed-placeholder");
        if (placeholder) {
            placeholder.remove();
        }

        const types = Array.isArray(paper.match_types)
            ? paper.match_types
            : (paper.match_type ? paper.match_type.split(" + ") : []);
        const terms = Array.isArray(paper.matched_terms) ? paper.matched_terms.join(", ") : "";

        const item = document.createElement("div");
        item.className = "flex items-start gap-3 py-2 animate-slide-up";

        const badgeContainer = document.createElement("div");
        badgeContainer.className = "shrink-0 flex flex-wrap gap-1";
        badgeContainer.appendChild(renderBadges(types));

        const textContainer = document.createElement("div");
        textContainer.className = "min-w-0";

        const title = document.createElement("p");
        title.className = "text-sm font-medium text-fg truncate";
        title.textContent = paper.title || "";

        const termsText = document.createElement("p");
        termsText.className = "text-xs text-fg-subtle truncate";
        termsText.textContent = terms;

        textContainer.appendChild(title);
        textContainer.appendChild(termsText);
        item.appendChild(badgeContainer);
        item.appendChild(textContainer);

        feed.appendChild(item);
        feed.scrollTop = feed.scrollHeight;
    }

    function showDone(data) {
        const newPapers = data.new_papers || 0;
        document.getElementById("progress-title").textContent = "Scrape complete";
        document.getElementById("progress-subtitle").textContent =
            `${newPapers} new paper${newPapers === 1 ? "" : "s"} added` +
            (data.duplicates_skipped > 0
                ? ` · ${data.duplicates_skipped} duplicate${data.duplicates_skipped !== 1 ? "s" : ""} skipped`
                : "");
        const bar = document.getElementById("progress-bar");
        bar.style.width = "100%";
        bar.className = "h-full bg-emerald-500 rounded-full transition-all duration-300 ease-out";
        bar.setAttribute("aria-valuenow", "100");
        document.getElementById("progress-pct").textContent = "100%";

        document.getElementById("stat-new").textContent = newPapers;
        document.getElementById("stat-matched").textContent = data.total_matched || 0;
        document.getElementById("stat-total").textContent = data.total_in_feed || 0;
        document.getElementById("progress-stats").classList.remove("hidden");
        document.getElementById("progress-footer").classList.remove("hidden");
        resetScrapeButton();
    }

    function pollScrapeStatus() {
        fetch("/api/scrape/status")
            .then(function (res) { return res.json(); })
            .then(function (data) {
                if (data.running) {
                    document.getElementById("progress-subtitle").textContent = "Scrape is still running. Waiting...";
                    setTimeout(pollScrapeStatus, 5000);
                } else if (data.terminal_status === "error") {
                    document.getElementById("progress-subtitle").textContent = "Scrape failed. Please try again.";
                    document.getElementById("progress-bar").className = "h-full bg-red-500 rounded-full transition-all duration-300 ease-out";
                    document.getElementById("progress-footer").classList.remove("hidden");
                    resetScrapeButton();
                } else if (data.terminal_status === "skipped") {
                    document.getElementById("progress-subtitle").textContent = "Scrape skipped because today's papers already exist.";
                    document.getElementById("progress-footer").classList.remove("hidden");
                    resetScrapeButton();
                } else {
                    document.getElementById("progress-subtitle").textContent = "Scrape finished. Click below to see results.";
                    document.getElementById("progress-footer").classList.remove("hidden");
                    resetScrapeButton();
                }
            })
            .catch(function () {
                document.getElementById("progress-subtitle").textContent = "Unable to reach server.";
                document.getElementById("progress-footer").classList.remove("hidden");
                resetScrapeButton();
            });
    }

    function closeScrapeAndReload() {
        window.location.href = "/";
    }

    applyTheme(getPreferredTheme());
</script>
