name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image repository
        id: image
        run: echo "repo=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/cv_arxiv-scraper" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.repo }}:latest
            ${{ steps.image.outputs.repo }}:${{ github.event.workflow_run.head_sha }}

      - name: Note skipped deploy
        if: ${{ secrets.DEPLOY_HOST == '' || secrets.DEPLOY_USER == '' || secrets.DEPLOY_SSH_KEY == '' || secrets.DEPLOY_PATH == '' }}
        run: |
          {
            echo "## Deploy skipped"
            echo ""
            echo "Required secrets are missing."
            echo "Set: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, DEPLOY_PATH"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy over SSH
        if: ${{ secrets.DEPLOY_HOST != '' && secrets.DEPLOY_USER != '' && secrets.DEPLOY_SSH_KEY != '' && secrets.DEPLOY_PATH != '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_PATH,IMAGE_REPO,IMAGE_TAG
          script: |
            set -e
            cd "${DEPLOY_PATH}"
            docker compose pull arxiv-scraper
            docker compose up -d --remove-orphans arxiv-scraper
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          IMAGE_REPO: ${{ steps.image.outputs.repo }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
