name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.lock

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      # pre-commit owns lint (ruff + format + standard hygiene hooks).
      # Contributors who ran `pre-commit install` locally will have already
      # caught violations before pushing; this step is the enforcement gate.
      - name: Pre-commit
        run: python -m pre_commit run --all-files --show-diff-on-failure

      - name: Verify WSGI entrypoint
        run: python -m gunicorn --check-config wsgi:app

  type:
    name: Type check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.lock

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: mypy
        run: python -m mypy app

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.lock

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run tests with coverage
        run: |
          python -m pytest --cov --cov-report=term-missing --cov-report=xml

      - name: Append coverage summary
        if: always()
        run: |
          {
            echo "## Coverage (${{ matrix.python-version }})"
            echo ""
            if [ -f .coverage ]; then
              echo '```'
              python -m coverage report --show-missing
              echo '```'
            else
              echo "Coverage data was not generated."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  security:
    name: Security (advisory)
    runs-on: ubuntu-latest
    # Advisory by design: CVE output is surfaced to reviewers, but transitive
    # dep upgrades land in dedicated PRs rather than blocking feature merges.
    # Flip `continue-on-error` to false once a lockfile + Dependabot are in place.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.lock

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Audit resolved environment
        run: python -m pip_audit --skip-editable --strict
