name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.lock

      - name: Install dependencies
        # Single-version (3.12) jobs install with the lockfile as a constraints
        # file (-c) so they run against the exact pinned runtime deps that ship
        # in the Docker image — reproducible, and immune to a new transitive
        # release breaking the check (see the Test job for why the matrix differs).
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c requirements.lock -e ".[dev]"

      # pre-commit owns lint (ruff + format + standard hygiene hooks).
      # Contributors who ran `pre-commit install` locally will have already
      # caught violations before pushing; this step is the enforcement gate.
      - name: Pre-commit
        run: python -m pre_commit run --all-files --show-diff-on-failure

      - name: Verify WSGI entrypoint
        run: python -m gunicorn --check-config wsgi:app

  type:
    name: Type check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.lock

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c requirements.lock -e ".[dev]"

      - name: mypy
        run: python -m mypy app

  test:
    name: Test
    runs-on: ubuntu-latest
    # faiss-cpu, torch, and scikit-learn each vendor their own GNU OpenMP runtime
    # (libgomp). Loading several into one process can call abort() (exit 134 /
    # SIGABRT) depending on the runner's load order — this intermittently crashed
    # the 3.12 leg while 3.10/3.11 (and local runs with the same wheels) passed.
    # Constraining OpenMP to a single thread avoids the duplicate-runtime abort.
    env:
      OMP_NUM_THREADS: "1"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.lock

      - name: Install dependencies
        # The matrix stays UNPINNED on purpose: requirements.lock targets
        # Python >=3.11 (numpy/scipy/networkx pins) and cannot install on the
        # 3.10 leg. The matrix validates the supported version range against
        # era-appropriate resolutions; reproducibility is enforced where it ships
        # (the Dockerfile installs from the lockfile) and in the 3.12 jobs above.
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run tests with coverage
        run: |
          python -m pytest --cov --cov-report=term-missing --cov-report=xml

      - name: Append coverage summary
        if: always()
        run: |
          {
            echo "## Coverage (${{ matrix.python-version }})"
            echo ""
            if [ -f .coverage ]; then
              echo '```'
              python -m coverage report --show-missing
              echo '```'
            else
              echo "Coverage data was not generated."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  security:
    name: Security (advisory)
    runs-on: ubuntu-latest
    # Advisory by design: CVE output is surfaced to reviewers, but transitive
    # dep upgrades land in dedicated PRs rather than blocking feature merges.
    # Flip `continue-on-error` to false once a lockfile + Dependabot are in place.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.lock

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c requirements.lock -e ".[dev]"

      # Audit the pinned runtime deps from the lockfile rather than the live
      # editable env: `--skip-editable` always skips the local `cv-arxiv-scraper`
      # package, which `--strict` then treats as an un-auditable dependency and
      # fails on — the two flags can never both be satisfied. Auditing the lock
      # is reproducible and avoids the editable package entirely.
      #
      # The three ignored advisories below were each researched and verified
      # UNREACHABLE in this app, and are either unfixable or fixable only via a
      # breaking major upgrade. Re-evaluate (and drop the ignore) when the noted
      # condition changes:
      #   - CVE-2025-3000  (torch): NO upstream fix exists — GHSA-rrmf-rvhw-rf47
      #       lists first_patched_version=None and pytorch/pytorch#149623 is open.
      #       Local-only segfault in torch.jit.script; this app only runs
      #       sentence-transformers inference and never scripts untrusted classes.
      #       Drop once a patched torch release ships.
      #   - PYSEC-2025-217 (transformers): RCE via torch.load in the X-CLIP
      #       conversion script, which is stripped from the published PyPI dist
      #       (verified absent from 4.57.6) — not shipped, not importable.
      #   - CVE-2026-1839  (transformers): insecure torch.load in Trainer; this app
      #       uses sentence-transformers inference, not Trainer. Fixed only in
      #       transformers 5.0, a breaking major that violates the
      #       sentence-transformers<4 pin. Drop when we can move to transformers>=5.
      - name: Audit resolved environment
        run: >-
          python -m pip_audit -r requirements.lock --strict
          --ignore-vuln CVE-2025-3000
          --ignore-vuln PYSEC-2025-217
          --ignore-vuln CVE-2026-1839
