email:
  recipient: ""
  subject_prefix: ArXiv Digest
scraper:
  feed_url: https://rss.arxiv.org/rss/cs.CV
  # How many days back the arXiv-API fallback fetches when the daily RSS feed is
  # thin/empty. 4 keeps the window overlapping the previous announcement even across
  # a long holiday weekend (e.g. Juneteenth + Sat/Sun); dedup prevents re-ingesting.
  rolling_window_days: 4
  max_workers: 8
  pdf_attempts: 2
  pdf_lines_start: 2
  pdf_max_header_lines: 50
  pdf_smart_header: true
  thumbnail_dpi: 150
ingest:
  backends:
    - rss
    - arxiv_api
llm:
  enabled: false
  # One combined JSON call per paper that also extracts tasks, datasets,
  # method type, backbone, and a "why this matched you" line.
  structured_insights: false
  provider: ollama
  model: gemma4:e2b
  base_url: http://localhost:11434/v1
  max_concurrent: 1
openalex:
  enabled: true
  email: ""
github:
  enabled: true
  # Optional personal access token (or set GITHUB_TOKEN) to raise the API rate
  # limit from 60 to 5000 requests/hour. Without it, fetches are capped per run.
  token: ""
preferences:
  ranking:
    author_weight: 44.0
    affiliation_weight: 26.0
    title_weight: 14.0
    ai_weight: 5.0
    citation_weight: 0.05
    venue_weight: 8.0
    # Learned interest profile (embedding similarity to your saved/skipped
    # papers); inert until >= 5 saved papers have embeddings.
    interest_weight: 12.0
    freshness_half_life_days: 14.0
  muted:
    authors: []
    affiliations: []
    topics: []
# These are computer-vision examples — replace them with YOUR own interests
# (or edit them later in the UI under Settings > Research Setup).
