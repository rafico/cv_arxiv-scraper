repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: local
    hooks:
      - id: block-credential-files
        name: Block committing credential files
        entry: scripts/block_credential_files.py
        language: script
        pass_filenames: true
        # Filename-pattern match only — pair with detect-secrets or gitleaks
        # if you need content-level scanning. A file renamed to `my_key.json`
        # bypasses this hook; that's intentional scope.
        files: '(^|/)(credentials\.json|token\.json|mendeley_credentials\.json|\.llm_api_key|\.mendeley_token|\.zotero_credentials|\.env|\.mcp\.json|\.flask_secret)$'
        description: "Refuse to stage credential or secret filenames."
